version: '3.8'

services:
  gaparr:
    build: .
    container_name: gaparr
    restart: unless-stopped
    ports:
      - "7117:7117"
    volumes:
      # Persistent data storage (sync state, ignores)
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PORT=7117
      - HOST=0.0.0.0
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7117/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s