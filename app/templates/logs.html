{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    
    <div class="card rounded-xl overflow-hidden mb-6">
        <div class="card-header">
            <svg class="card-header-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <div>
                <h2 class="card-header-title">Application Logs</h2>
                <p class="card-header-subtitle">View Gaparr activity and debug information</p>
            </div>
            <div class="ml-auto flex gap-2">
                <button onclick="downloadLogs()" class="btn-sm btn-outline">
                    ⬇ Download
                </button>
                <button onclick="clearLogs()" class="btn-sm btn-danger">
                    🗑 Clear
                </button>
            </div>
        </div>
    </div>

    <!-- Filter Controls -->
    <div class="card rounded-xl p-4 mb-4">
        <div class="flex items-center gap-4 flex-wrap">
            <div class="flex items-center gap-2">
                <label class="text-sm">Filter:</label>
                <select id="log-filter" onchange="filterLogs()"
                    class="px-3 py-1 rounded-lg text-sm border"
                    style="background: var(--bg-primary); border-color: var(--border-color); color: var(--text-primary);">
                    <option value="ALL">All</option>
                    <option value="INFO">Info</option>
                    <option value="WARNING">Warning</option>
                    <option value="ERROR">Error</option>
                    <option value="DEBUG">Debug</option>
                </select>
            </div>
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" id="auto-scroll" checked class="accent-indigo-500" />
                <span class="text-sm">Auto-scroll</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" id="auto-refresh" checked class="accent-indigo-500" />
                <span class="text-sm">Auto-refresh (5s)</span>
            </label>
            <button onclick="loadLogs()" class="btn-raise px-3 py-1 rounded-lg text-sm border"
                style="border-color: var(--border-color); color: var(--text-secondary);">
                ↻ Refresh
            </button>
        </div>
    </div>

    <!-- Log Viewer -->
    <div class="card rounded-xl overflow-hidden">
        <div id="log-viewer"
            class="p-4 font-mono text-xs overflow-y-auto"
            style="height: 500px; background: var(--bg-primary);">
            <div id="log-content">Loading...</div>
        </div>
    </div>

    <p id="log-meta" class="text-xs mt-2" style="color: var(--text-secondary)"></p>

</div>

<!-- Clear Logs Dialog -->
<div id="clear-dialog" class="hidden fixed inset-0 flex items-center justify-center z-50"
    style="background: rgba(0,0,0,0.6)">
    <div class="card rounded-xl p-6 max-w-sm w-full mx-4">
        <h3 class="font-semibold mb-2">Clear Logs</h3>
        <p class="text-sm mb-6" style="color: var(--text-secondary);">
            This will clear all log entries from the display. The log file will still exist on disk.
        </p>
        <div class="flex gap-3">
            <button onclick="confirmClearLogs()" class="btn-raise flex-1 py-2 rounded-lg text-sm font-medium"
                style="background: #ef4444; color: white;">Clear</button>
            <button onclick="closeClearDialog()"
                class="btn-raise flex-1 py-2 rounded-lg text-sm border"
                style="border-color: var(--border-color);">Cancel</button>
        </div>
    </div>
</div>

<script>
    let allLines = [];
    let autoRefreshInterval = null;

    window.addEventListener('DOMContentLoaded', () => {
        loadLogs();
        setupAutoRefresh();
    });

    window.addEventListener('beforeunload', () => {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    });

    async function loadLogs() {
        try {
            const res = await fetch('/api/logs?lines=200');
            const data = await res.json();
            
            if (data.lines && data.lines.length > 0) {
                const logContent = document.getElementById('log-content');
                allLines = data.lines;
                
                logContent.innerHTML = data.lines.map(line => {
                    let color = 'var(--text-primary)';
                    if (line.includes('ERROR')) color = '#f87171';
                    else if (line.includes('WARNING')) color = '#fbbf24';
                    else if (line.includes('INFO')) color = '#86efac';
                    else if (line.includes('DEBUG')) color = '#94a3b8';
                    
                    return `<div style="color: ${color}; padding: 1px 0; font-family: monospace; font-size: 12px; white-space: pre-wrap; border-bottom: 1px solid var(--border-color);">${escapeHtml(line)}</div>`;
                }).join('');
                
                document.getElementById('log-meta').textContent = `Showing ${data.showing} of ${data.total_lines} lines from ${data.log_file || 'gaparr.log'}`;
                
                // Auto-scroll to bottom
                if (document.getElementById('auto-scroll').checked) {
                    const viewer = document.getElementById('log-viewer');
                    viewer.scrollTop = viewer.scrollHeight;
                }
            } else {
                document.getElementById('log-content').innerHTML = '<div style="color: var(--text-secondary); padding: 1rem;">No log entries found. Logs will appear here once Gaparr starts.</div>';
                document.getElementById('log-meta').textContent = 'No logs available';
            }
        } catch (e) {
            console.error('Failed to load logs:', e);
            document.getElementById('log-content').innerHTML = `<div style="color: var(--danger); padding: 1rem;">Failed to load logs: ${e.message}</div>`;
        }
    }

    function filterLogs() {
        const filter = document.getElementById('log-filter').value;
        
        if (filter === 'ALL') {
            // Re-display all lines
            const logContent = document.getElementById('log-content');
            if (allLines.length > 0) {
                logContent.innerHTML = allLines.map(line => {
                    let color = 'var(--text-primary)';
                    if (line.includes('ERROR')) color = '#f87171';
                    else if (line.includes('WARNING')) color = '#fbbf24';
                    else if (line.includes('INFO')) color = '#86efac';
                    else if (line.includes('DEBUG')) color = '#94a3b8';
                    
                    return `<div style="color: ${color}; padding: 1px 0; font-family: monospace; font-size: 12px; white-space: pre-wrap; border-bottom: 1px solid var(--border-color);">${escapeHtml(line)}</div>`;
                }).join('');
            }
            return;
        }
        
        // Filter lines
        const filtered = allLines.filter(line => line.includes(`[${filter}]`));
        const logContent = document.getElementById('log-content');
        
        if (filtered.length === 0) {
            logContent.innerHTML = `<div style="color: var(--text-secondary); padding: 1rem;">No ${filter} log entries found.</div>`;
        } else {
            logContent.innerHTML = filtered.map(line => {
                let color = 'var(--text-primary)';
                if (line.includes('ERROR')) color = '#f87171';
                else if (line.includes('WARNING')) color = '#fbbf24';
                else if (line.includes('INFO')) color = '#86efac';
                else if (line.includes('DEBUG')) color = '#94a3b8';
                
                return `<div style="color: ${color}; padding: 1px 0; font-family: monospace; font-size: 12px; white-space: pre-wrap; border-bottom: 1px solid var(--border-color);">${escapeHtml(line)}</div>`;
            }).join('');
        }
    }

    function setupAutoRefresh() {
        const autoRefreshCheckbox = document.getElementById('auto-refresh');
        
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                if (autoRefreshCheckbox.checked) {
                    loadLogs();
                }
            }, 5000);
        }
        
        startAutoRefresh();
        
        autoRefreshCheckbox.addEventListener('change', () => {
            if (autoRefreshCheckbox.checked) {
                startAutoRefresh();
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
            }
        });
    }

    function downloadLogs() {
        if (allLines.length === 0) {
            showToast('No logs to download', 'warning');
            return;
        }
        
        const logText = allLines.join('\n');
        const blob = new Blob([logText], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `gaparr_logs_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Logs downloaded', 'success');
    }

    function clearLogs() {
        document.getElementById('clear-dialog').classList.remove('hidden');
    }

    function closeClearDialog() {
        document.getElementById('clear-dialog').classList.add('hidden');
    }

    async function confirmClearLogs() {
        closeClearDialog();
        
        try {
            const res = await fetch('/api/logs', { method: 'DELETE' });
            if (res.ok) {
                showToast('Logs cleared', 'success');
                loadLogs();
            } else {
                showToast('Failed to clear logs', 'error');
            }
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
{% endblock %}
